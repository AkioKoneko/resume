name: Generate Resume PDF

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - scripts/generate-pdf.mjs
      - package.json
      - .github/workflows/generate-resume-pdf.yml
    paths-ignore:
      - Aleksandr_Detushev_Resume.pdf
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate PDF
        run: npm run generate:pdf

      - name: Commit updated PDF
        run: |
          if git diff --quiet -- Aleksandr_Detushev_Resume.pdf; then
            echo "No PDF changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Aleksandr_Detushev_Resume.pdf
          git commit -m "chore: regenerate resume PDF"
          git push
